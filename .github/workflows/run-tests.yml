name: Run Playwright Tests

env:
  QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
  QASE_PROJECT: ${{ secrets.QASE_PROJECT }}

on:
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run tests on"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      env:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - stg
          - prod
      markers:
        description: "pytest markers to filter (e.g. smoke, regression)"
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps ${{ github.event.inputs.browser }}

      - name: Run tests
        run: |
          MARKERS="${{ github.event.inputs.markers }}"
          if [ -n "$MARKERS" ]; then
            pytest --browser=${{ github.event.inputs.browser }} \
                   --env=${{ github.event.inputs.env }} \
                   -m "$MARKERS" \
                   --qase-mode=testops \
                   --qase-testops-api-token=$QASE_API_TOKEN \
                   --qase-testops-project=$QASE_PROJECT \
                   --json-report --json-report-file=reports/test-results.json \
                   --html=reports/index.html --self-contained-html
          else
            pytest --browser=${{ github.event.inputs.browser }} \
                   --env=${{ github.event.inputs.env }} \
                   --qase-mode=testops \
                   --qase-testops-api-token=$QASE_API_TOKEN \
                   --qase-testops-project=$QASE_PROJECT \
                   --json-report --json-report-file=reports/test-results.json \
                   --html=reports/index.html --self-contained-html
          fi

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports-${{ github.run_id }}
          path: |
            reports/
            test-artifacts/
          retention-days: 30